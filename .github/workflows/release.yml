name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: Hermes-Installer-macOS.zip
            build_script: ./scripts/build_macos.sh
          - os: windows-latest
            artifact_name: Hermes-Installer-Windows.exe
            build_script: ./scripts/build_windows.ps1

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Import Apple Developer ID certificate
        id: apple_cert
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APP_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          APPLE_DEVELOPER_ID_APP_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}
        run: |
          if [[ -z "${APPLE_DEVELOPER_ID_APP_CERT_P12_BASE64}" || -z "${APPLE_DEVELOPER_ID_APP_CERT_PASSWORD}" ]]; then
            echo "::warning::Missing Apple signing certificate secrets. Publishing unsigned macOS artifact."
            echo "cert_ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/developer-id-app.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$APPLE_DEVELOPER_ID_APP_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_DEVELOPER_ID_APP_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "cert_ready=true" >> "$GITHUB_OUTPUT"

      - name: Build artifact
        shell: bash
        env:
          APP_BUNDLE_ID: io.github.devvgwardo.hermes-installer
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            pwsh ./scripts/build_windows.ps1
          else
            ./scripts/build_macos.sh
          fi

      - name: Sign and notarize macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APP: ${{ secrets.APPLE_DEVELOPER_ID_APP }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          if [[ "${{ steps.apple_cert.outputs.cert_ready }}" != "true" ]]; then
            echo "::warning::Apple certificate was not imported. Skipping signing/notarization."
            exit 0
          fi
          if [[ -z "${APPLE_DEVELOPER_ID_APP}" || -z "${APPLE_NOTARY_APPLE_ID}" || -z "${APPLE_NOTARY_TEAM_ID}" || -z "${APPLE_NOTARY_APP_PASSWORD}" ]]; then
            echo "::warning::Missing notarization secrets. Publishing unsigned macOS artifact."
            exit 0
          fi
          if ! ./scripts/sign_and_notarize_macos.sh; then
            echo "::warning::macOS signing/notarization failed. Publishing unsigned macOS artifact."
          fi

      - name: Compute sha256
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          asset = Path("dist/${{ matrix.artifact_name }}")
          digest = hashlib.sha256(asset.read_bytes()).hexdigest()
          Path("dist/SHA256SUMS-${{ runner.os }}.txt").write_text(f"{digest}  {asset.name}\n", encoding="utf-8")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-release
          path: |
            dist/${{ matrix.artifact_name }}
            dist/SHA256SUMS-${{ runner.os }}.txt

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Combine checksums
        run: |
          find dist-artifacts -name 'SHA256SUMS-*.txt' -print0 | xargs -0 cat > SHA256SUMS.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-artifacts/**/Hermes-Installer-macOS.zip
            dist-artifacts/**/Hermes-Installer-Windows.exe
            SHA256SUMS.txt
